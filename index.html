<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Lalis ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Segoe UI', sans-serif;
    overflow-x:hidden;
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:
      radial-gradient(2px 2px at 20px 30px,#fff,transparent),
      radial-gradient(2px 2px at 120px 130px,#fff,transparent),
      radial-gradient(2px 2px at 300px 80px,#fff,transparent),
      radial-gradient(2px 2px at 500px 200px,#fff,transparent),
      radial-gradient(2px 2px at 800px 100px,#fff,transparent),
      radial-gradient(2px 2px at 1000px 250px,#fff,transparent);
    background-size:1200px 600px;
    animation:moveStars 60s linear infinite;
    z-index:-2;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-600px);}
}

.center{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:white;
    color:black;
    font-size:1.1rem;
    cursor:pointer;
    font-weight:bold;
    transition: transform 0.2s;
}

button:active {
    transform: scale(0.95);
}

.content{
    display:none;
    max-width:800px;
    text-align:center;
    animation:fade 2s;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

img{
    width:320px;
    max-width:90%;
    border-radius:20px;
    margin:25px 0;
    box-shadow:0 0 30px rgba(255,255,255,.2);
}

h1{
    margin-bottom:15px;
    font-size:2.5rem;
}

.text{
    line-height:1.8;
    font-size:1.2rem;
    white-space:pre-wrap;
}

.signature{
    margin-top:40px;
    font-style:italic;
    font-size:1.1rem;
}

.spotify{
    margin-top:30px;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="center">

<div id="inicio">
    <button onclick="abrirRegalo()">🎁 Toca aquí 🎁</button>
</div>

<div class="content" id="contenido">

    <h1>Feliz cumpleaños Lalis 🫶🏼</h1>

    <img src="D1C06803-EBBB-4AE4-AE08-79AA8CE6DA54.png" alt="Nosotros">

    <div class="text" id="mensaje"></div>

    <div class="spotify">
        <iframe width="100%" height="200" 
        src="https://www.youtube.com/embed/K1OM3q2BMxc" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen
        style="border-radius:12px; box-shadow: 0 0 15px rgba(255,255,255,0.1);">
        </iframe>
    </div>

    <div class="signature">
        ❤️<br><br>
        Con amor,<br>
        Al que amas de aquí a antes de SJ ❤️
    </div>

</div>

</div>

<script>

const texto = `Es muy bonito poder volverte a felicitar como ya es costumbre y ojalá así sea siempre.

Ya sabes que yo siempre voy a estar para ti en lo que ocupes y que TE AMO un chingo mi chiquilla (aunque digas que no).

Ojalá sigas cumpliendo muchísimos años más y poder estar contigo ❤️🥳

felichidadesh`;

let yaEscribio = false;

function abrirRegalo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("contenido").style.display="block";
    if(!yaEscribio){
        escribirTexto();
        yaEscribio = true;
    }
}

function escribirTexto(){
    let i=0;
    let velocidad=35;
    const contenedor = document.getElementById("mensaje");
    contenedor.innerHTML = "";

    function escribir(){
        if(i < texto.length){
            contenedor.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, velocidad);
        }
    }

    document.title = "Para Lalis ❤️";
    escribir();
}

</script>

</body>
</html>
